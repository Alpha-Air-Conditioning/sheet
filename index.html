<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white shadow-xl rounded-2xl p-8 max-w-2xl w-full border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">Update Google Spreadsheet</h1>
        
        <textarea id="csvInput" 
            class="w-full h-72 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono text-sm mb-4" 
            placeholder="Paste your data here..."></textarea>
        
        <button id="submitBtn" onclick="sendData()" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
            Push to Google Sheets
        </button>
        
        <div id="status" class="mt-4 text-center text-sm font-semibold"></div>
    </div>

    <script>
        async function sendData() {
            const input = document.getElementById('csvInput').value;
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');

            if (!input.trim()) {
                status.innerText = "❌ Please paste some data first.";
                status.className = "mt-4 text-center text-red-500 font-semibold";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Sending...";
            status.innerText = "Processing...";

            try {
                const response = await fetch('/api/update-sheet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ csvData: input })
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerHTML = `✅ Success! <a href="https://docs.google.com/spreadsheets/d/1gLxTk9bfXxP5jnvo73ua7S4VdABDV7-gA-011-W15wk/" target="_blank" class="text-blue-600 underline">Open Sheet</a>`;
                    status.className = "mt-4 text-center text-green-600 font-semibold";
                } else {
                    status.innerText = "❌ " + data.error;
                    status.className = "mt-4 text-center text-red-600 font-semibold";
                }
            } catch (err) {
                status.innerText = "❌ Network Error. Check Vercel Logs.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Push to Google Sheets";
            }
        }
    </script>
</body>
</html>
