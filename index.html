<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter List Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-3xl w-full bg-white rounded-3xl shadow-2xl p-8 border border-gray-200">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-green-100 p-3 rounded-full text-green-600 font-bold text-xl">📊</div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">Voter Data Sync</h1>
        </div>

        <p class="text-gray-500 mb-4 text-sm font-medium">Paste your CSV data from Gemini below:</p>
        
        <textarea id="csvBox" class="w-full h-80 p-5 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:border-green-500 focus:ring-0 transition-all font-mono text-xs text-gray-700 mb-6" placeholder="Serial No,Name,Guardian Name..."></textarea>

        <button id="syncBtn" onclick="sendToSheets()" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-green-200 transition-all active:scale-[0.98] flex items-center justify-center gap-2 uppercase tracking-wider">
            Push to Google Sheets
        </button>

        <div id="status" class="mt-6 text-center font-bold text-sm"></div>
    </div>

    <script>
        async function sendToSheets() {
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('status');
            const csv = document.getElementById('csvBox').value;

            if (!csv.trim()) return alert("Please paste the data first!");

            btn.disabled = true;
            btn.innerHTML = "Processing...";
            status.innerText = "⏳ Connecting to Google Cloud...";
            status.className = "mt-6 text-center font-bold text-sm text-gray-500";

            try {
                const response = await fetch('/api/update-sheet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ csvData: csv })
                });

                const result = await response.json();

                if (response.ok) {
                    status.innerHTML = `✅ SYNC COMPLETE! <a href="https://docs.google.com/spreadsheets/d/1gLxTk9bfXxP5jnvo73ua7S4VdABDV7-gA-011-W15wk/" target="_blank" class="text-blue-600 underline ml-2">Open Sheet</a>`;
                    status.className = "mt-6 text-center font-bold text-sm text-green-600 uppercase";
                    document.getElementById('csvBox').value = ""; // Clear box on success
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                status.innerText = "❌ ERROR: " + err.message;
                status.className = "mt-6 text-center font-bold text-sm text-red-600";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Push to Google Sheets";
            }
        }
    </script>
</body>
</html>
