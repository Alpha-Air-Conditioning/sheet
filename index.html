<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CSV to Excel (.xlsx) Converter</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl text-center">

<h1 class="text-2xl font-bold text-gray-800 mb-2">
Excel (.xlsx) Generator
</h1>

<p class="text-gray-600 mb-6">
Paste CSV data below and download it as an Excel file.
</p>

<textarea
id="csvInput"
class="w-full h-64 p-4 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none font-mono text-sm mb-4"
placeholder="Paste CSV data here..."
></textarea>

<button
onclick="downloadExcel()"
class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition"
>
Download Excel (.xlsx)
</button>

</div>

<script>

function downloadExcel() {

const csvText = document.getElementById("csvInput").value;

if (!csvText.trim()) {
alert("Please paste CSV data first.");
return;
}

try {

const workbook = XLSX.read(csvText, { type: "string" });

XLSX.writeFile(workbook, "Voter_Data.xlsx");

} catch (error) {

console.error(error);
alert("Error converting CSV. Please check your data.");

}

}

</script>

</body>
</html>
